name: Sync playwright-cli skill

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sync script
        run: ./scripts/sync-playwright-cli.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet skills/system/playwright-cli/upstream/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing sync PR
        if: steps.diff.outputs.changed == 'true'
        id: existing
        run: |
          count=$(gh pr list --search "chore: sync playwright-cli" --state open --json number --jq length)
          echo "exists=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        run: |
          branch="chore/sync-playwright-cli-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add skills/system/playwright-cli/upstream/
          git commit -m "chore: sync playwright-cli skill from upstream"
          git push -u origin "$branch"
          gh pr create \
            --title "chore: sync playwright-cli skill from upstream" \
            --body "$(cat <<'EOF'
          ## Automated sync

          Updated `skills/system/playwright-cli/upstream/` from
          [microsoft/playwright-cli](https://github.com/microsoft/playwright-cli).

          **Before merging**, update `CHANGELOG.md` with a dated entry.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
